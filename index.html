<style>
body{
    margin:0;
    height:200vh;
    background:#0f172a;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* Orb */
#auris{
    position:fixed;
    width:70px;
    height:70px;
    border-radius:50%;
    background:radial-gradient(circle,#60a5fa,#1e3a8a);
    box-shadow:0 0 20px #60a5fa,0 0 40px #1e40af;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:9999;
    transform:translate(-50%, -50%);
    transition: transform 0.1s linear;
    pointer-events:auto;
}
#auris::after{
    content:"";
    width:30px;
    height:30px;
