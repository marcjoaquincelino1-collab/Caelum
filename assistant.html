<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caelum AI Assistant</title>

<style>

/* Floating Button */
#ai-assistant {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #0d1b2a;
    box-shadow: 0 0 15px rgba(0,180,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    animation: float 3s ease-in-out infinite;
    z-index: 9999;
}

#ai-assistant img {
    width: 60px;
    height: 60px;
}

/* Floating animation */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

/* Chat Box */
#chat-box {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 280px;
    max-height: 400px;
    background: #112240;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,150,255,0.4);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
}

/* Chat Header */
#chat-header {
    background: #0a192f;
    padding: 10px;
    color: white;
    font-weight: bold;
    text-align: center;
}

/* Messages */
#chat-messages {
    padding: 10px;
    overflow-y: auto;
    flex: 1;
    color: white;
    font-size: 14px;
}

/* Speech bubble */
.bubble {
    background: #1f4068;
    padding: 8px 12px;
    border-radius: 15px;
    margin-bottom: 8px;
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Input */
#chat-input {
    border: none;
    padding: 10px;
    outline: none;
    font-size: 14px;
    width: 100%;
}

/* Mobile Optimization */
@media (max-width: 600px) {
    #chat-box {
        width: 90%;
        right: 5%;
        bottom: 90px;
    }

    #ai-assistant {
        width: 60px;
        height: 60px;
    }

    #ai-assistant img {
        width: 50px;
        height: 50px;
    }
}

</style>
</head>

<body>

<!-- Floating Mascot -->
<div id="ai-assistant">
    <img src="mascot.png" alt="AI Mascot">
</div>

<!-- Chat Box -->
<div id="chat-box">
    <div id="chat-header">Caelum AI</div>
    <div id="chat-messages">
        <div class="bubble">Hi! I’m your digital guardian ✨ How can I protect you today?</div>
    </div>
    <input type="text" id="chat-input" placeholder="Type your message...">
</div>

<script>

const assistant = document.getElementById("ai-assistant");
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("chat-input");
const messages = document.getElementById("chat-messages");

assistant.onclick = () => {
    chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";
    chatBox.style.display = "flex";
};

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && input.value.trim() !== "") {

        let userBubble = document.createElement("div");
        userBubble.className = "bubble";
        userBubble.style.background = "#2e86de";
        userBubble.innerText = input.value;
        messages.appendChild(userBubble);

        input.value = "";

        messages.scrollTop = messages.scrollHeight;

        setTimeout(() => {
            let aiBubble = document.createElement("div");
            aiBubble.className = "bubble";
            aiBubble.innerText = "Analyzing your request securely... 🔐";
            messages.appendChild(aiBubble);
            messages.scrollTop = messages.scrollHeight;
        }, 800);
    }
});

</script>

</body>
</html>
